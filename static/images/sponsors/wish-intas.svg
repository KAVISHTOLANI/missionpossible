      <stop offset="0.58" stop-color="#ffbd31"/>
      <stop offset="0.8" stop-color="#44b8ff"/>
      <stop offset="1" stop-color="#6834d6"/>
    </radialGradient>
    <linearGradient id="dancer" x1="0" y1="0" x2="1" y2="1">

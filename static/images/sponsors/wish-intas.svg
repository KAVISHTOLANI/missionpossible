  <text x="255" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="29" font-style="italic" fill="#b9b9bd">A Division of INTAS</text>
  <text x="202" y="328" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-style="italic" fill="#ff3b9c">Realizing the Dreams</text>
